<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetWalk - Identificação</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-shell">
        
        <section id="login" class="screen active" style="padding: 32px; justify-content: center;">
            <div class="flex flex-col items-center mb-10">
                <div class="w-16 h-16 bg-[rgba(20,184,166,0.1)] rounded-2xl flex items-center justify-center mb-4">
                    <i data-lucide="dog" class="text-[#14b8a6] w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-[#030213]">Bem-vindo de volta</h2>
                <p class="text-gray-400 text-sm mt-1">Entre para cuidar do seu pet</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-gray-500 uppercase ml-1">E-mail</label>
                    <input type="email" id="loginEmail" class="input-field" placeholder="seu@email.com">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-500 uppercase ml-1">Senha</label>
                    <input type="password" id="loginPass" class="input-field" placeholder="••••••••">
                </div>
                <button type="button" onclick="handleAuthLogin()" class="btn-main w-full !bg-[#14b8a6] mt-4">Entrar</button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-4">Criar nova conta</p>
                <div class="flex gap-3">
                    <button type="button" onclick="navigate('reg-owner')" class="flex-1 py-3 border-2 border-[#14b8a6] text-[#14b8a6] rounded-xl font-bold text-xs hover:bg-[#ccfbf1] transition-colors">SOU DONO</button>
                    <button type="button" onclick="navigate('reg-walker')" class="flex-1 py-3 border-2 border-[#030213] text-[#030213] rounded-xl font-bold text-xs hover:bg-[#f1f5f9] transition-colors">PASSEADOR</button>
                </div>
            </div>
        </section>

        <section id="reg-owner" class="screen bg-white" style="padding: 32px; justify-content: center;">
            <i data-lucide="chevron-left" onclick="navigate('login')" class="mb-6 cursor-pointer text-[#030213]"></i>
            <h2 class="text-2xl font-bold text-[#14b8a6] mb-2">Criar conta Dono</h2>
            <p class="text-gray-400 text-sm mb-8">Encontre os melhores passeadores para o seu pet.</p>

            <form class="space-y-4">
                <input type="text" id="ownerName" placeholder="Nome Completo" class="input-field">
                <input type="email" id="ownerEmail" placeholder="E-mail" class="input-field">
                <input type="text" id="ownerPhone" placeholder="Telefone (Ex: 11999999999)" class="input-field">
                <input type="password" id="ownerPass" placeholder="Senha Forte" class="input-field">
                <button type="button" onclick="handleRegister('dono')" class="btn-main w-full !bg-[#14b8a6]">Finalizar Cadastro</button>
            </form>
        </section>

        <section id="reg-walker" class="screen bg-white" style="padding: 32px; justify-content: center;">
            <i data-lucide="chevron-left" onclick="navigate('login')" class="mb-6 cursor-pointer text-[#030213]"></i>
            <h2 class="text-2xl font-bold text-[#030213] mb-2">Seja um Passeador</h2>
            <p class="text-gray-400 text-sm mb-8">Ganhe dinheiro passeando com cães na sua região.</p>

            <form class="space-y-4">
                <input type="text" id="walkerName" placeholder="Nome Completo" class="input-field">
                <input type="email" id="walkerEmail" placeholder="E-mail" class="input-field">
                <input type="text" id="walkerPhone" placeholder="Telefone (Ex: 11999999999)" class="input-field">
                <input type="password" id="walkerPass" placeholder="Senha Forte" class="input-field">
                <button type="button" onclick="handleRegister('passeador')" class="btn-main w-full">Criar Perfil Profissional</button>
            </form>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
